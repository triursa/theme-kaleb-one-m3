services:
  theme-sandbox:
    build: .
    # NOTE: Cannot run as non-root — nginx needs to write cache dirs
    container_name: theme-kaleb-one
    restart: unless-stopped
    ports:
      - "127.0.0.1:8095:8080"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || wget -qO /dev/null http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s